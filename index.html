<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Catalogue</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root {
  --bg:#121417;
  --panel:#1b1f24;
  --accent:#3ea6ff;
  --text:#e6e6e6;
  --muted:#9aa4ad;
  --border:#2a2f36;
}

body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{padding:16px;}

.filters{
  position:sticky;
  top:0;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  z-index:10;
}

.filter-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}

.filter-row input,
.filter-row select{
  background:#22272e;
  border:1px solid var(--border);
  color:var(--text);
  padding:4px 6px;
  border-radius:4px;
  font-size:0.85rem;
}

.filter-row label{
  font-size:0.8rem;
  color:var(--muted);
}

details summary{
  cursor:pointer;
  font-weight:600;
  margin:6px 0;
}

.checkbox-group{
  display:flex;
  flex-wrap:wrap;
  gap:6px 12px;
  font-size:0.8rem;
}

.badge{
  background:#2c3440;
  padding:2px 6px;
  border-radius:4px;
  font-size:0.7rem;
  margin-right:4px;
  display:inline-block;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:0.85rem;
}

th,td{
  padding:6px;
  border-bottom:1px solid var(--border);
}

tr:hover{background:#1e242b;}

.pagination{
  margin-top:12px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

button{
  background:var(--accent);
  border:none;
  padding:4px 10px;
  border-radius:4px;
  cursor:pointer;
  font-size:0.8rem;
}

button:disabled{opacity:0.4;}

.counter{
  font-size:0.8rem;
  color:var(--muted);
  margin-top:6px;
}

@media(max-width:768px){
  table{font-size:0.75rem;}
  .filter-row{flex-direction:column; align-items:flex-start;}
}
</style>
</head>

<body>

<div class="filters container">

<div class="filter-row">
<label>Title</label>
<input type="text" id="search" style="flex:1; min-width:160px">

<label>Min (min)</label>
<input type="number" id="minLength" style="width:70px">

<label>Max (min)</label>
<input type="number" id="maxLength" style="width:70px">

<label>Newer than</label>
<input type="date" id="minDate">

<label>Older than</label>
<input type="date" id="maxDate">

<select id="statusFilter">
<option value="all">All</option>
<option value="solved">Solved</option>
<option value="unsolved">Unsolved</option>
</select>
</div>

<div id="constraintSection"></div>

<details>
<summary>Hosts</summary>
<div id="hostSection" class="checkbox-group"></div>
</details>

<details>
<summary>Setters</summary>
<div id="setterSection" class="checkbox-group"></div>
</details>

<div class="counter" id="counter"></div>

</div>

<div class="container">

<table>
<thead>
<tr>
<th>Date</th>
<th>Title</th>
<th>Host</th>
<th>Setter</th>
<th>Length</th>
<th>Constraints</th>
<th>Solved</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
<button id="prevPage">Previous</button>
<button id="nextPage">Next</button>
<span id="pageInfo"></span>
</div>

</div>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/1rVqAjm-l_Urjd3TNmIc3SmTmz_OlgSoBuhY7RPgiuRg/export?format=csv&gid=725349095";

let DATA=[];
let filteredData=[];
let currentPage=1;
const rowsPerPage=50;

const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};

function parseLength(str){
  const p=str.split(":").map(Number);
  return p.length===3?p[0]*3600+p[1]*60+p[2]:0;
}

function parseDate(str){
  const [d,m,y]=str.split("-");
  return new Date(y,months[m],d);
}

function getSolvedMap(){
  return JSON.parse(localStorage.getItem("solvedMap")||"{}");
}

function saveSolvedMap(map){
  localStorage.setItem("solvedMap",JSON.stringify(map));
}

async function loadData(){
  const res=await fetch(CSV_URL);
  const text=await res.text();
  const cleaned=text.split("\n").slice(1).join("\n");

  const parsed=Papa.parse(cleaned,{header:true,skipEmptyLines:true});

  DATA=parsed.data.filter(r=>(r["Video Type"]||"").trim().toLowerCase()==="sudoku");

  initLengthDefaults();
  generateDynamicFilters();
  applyFilters();
}

function initLengthDefaults(){
  const lengths=DATA.map(d=>parseLength(d.Length||"0:00:00")/60);
  const min=Math.floor(Math.min(...lengths));
  const max=Math.ceil(Math.max(...lengths));
  document.getElementById("minLength").value=min;
  document.getElementById("maxLength").value=max;
}

function generateDynamicFilters(){
  const hosts=[...new Set(DATA.map(d=>d["Host/Solver"]).filter(Boolean))];
  const setters=[...new Set(DATA.map(d=>d["Setter"]).filter(Boolean))];

  const constraintCounts={};
  DATA.forEach(d=>{
    (d["Puzzle Sub-Type / Constraints"]||"")
    .split(";").map(s=>s.trim()).filter(Boolean)
    .forEach(c=>constraintCounts[c]=(constraintCounts[c]||0)+1);
  });

  const sortedConstraints=Object.keys(constraintCounts)
    .sort((a,b)=>constraintCounts[b]-constraintCounts[a]);

  const main=sortedConstraints.filter(c=>constraintCounts[c]>=100);
  const other=sortedConstraints.filter(c=>constraintCounts[c]<100);

  const constraintDiv=document.getElementById("constraintSection");

  const mainGroup=document.createElement("div");
  mainGroup.className="checkbox-group";
  main.forEach(c=>{
    mainGroup.innerHTML+=
    `<label><input type="checkbox" class="constraintCheckbox" value="${c}"> ${c} (${constraintCounts[c]})</label>`;
  });

  const moreDetails=document.createElement("details");
  moreDetails.innerHTML="<summary>More</summary>";

  const moreGroup=document.createElement("div");
  moreGroup.className="checkbox-group";

  moreGroup.innerHTML+=`
  <div style="margin-bottom:6px;">
  <select id="constraintMode">
    <option value="OR">OR</option>
    <option value="AND">AND</option>
  </select>
  </div>`;

  other.forEach(c=>{
    moreGroup.innerHTML+=
    `<label><input type="checkbox" class="constraintCheckbox" value="${c}"> ${c} (${constraintCounts[c]})</label>`;
  });

  moreDetails.appendChild(moreGroup);

  constraintDiv.appendChild(mainGroup);
  constraintDiv.appendChild(moreDetails);

  document.getElementById("hostSection").innerHTML=
    hosts.sort().map(h=>`<label><input type="checkbox" class="hostCheckbox" value="${h}"> ${h}</label>`).join("");

  document.getElementById("setterSection").innerHTML=
    setters.sort().map(s=>`<label><input type="checkbox" class="setterCheckbox" value="${s}"> ${s}</label>`).join("");
}

function applyFilters(){
  currentPage=1;

  const search=document.getElementById("search").value.toLowerCase();
  const minLen=Number(document.getElementById("minLength").value)*60;
  const maxLen=Number(document.getElementById("maxLength").value)*60;
  const minDate=document.getElementById("minDate").value?new Date(document.getElementById("minDate").value):null;
  const maxDate=document.getElementById("maxDate").value?new Date(document.getElementById("maxDate").value):null;
  const status=document.getElementById("statusFilter").value;
  const constraintMode=document.getElementById("constraintMode")?.value||"OR";
  const solvedMap=getSolvedMap();

  const selectedHosts=[...document.querySelectorAll(".hostCheckbox:checked")].map(cb=>cb.value);
  const selectedSetters=[...document.querySelectorAll(".setterCheckbox:checked")].map(cb=>cb.value);
  const selectedConstraints=[...document.querySelectorAll(".constraintCheckbox:checked")].map(cb=>cb.value);

  filteredData=DATA.filter(item=>{
    if(!(item["Video Title"]?.toLowerCase().includes(search) ||
         item["Puzzle Title"]?.toLowerCase().includes(search))) return false;

    if(selectedHosts.length && !selectedHosts.includes(item["Host/Solver"])) return false;
    if(selectedSetters.length && !selectedSetters.includes(item["Setter"])) return false;

    const len=parseLength(item.Length||"0:00:00");
    if(len<minLen||len>maxLen) return false;

    const date=parseDate(item.Date||"01-Jan-2000");
    if(minDate && date<minDate) return false;
    if(maxDate && date>maxDate) return false;

    const isSolved=solvedMap[item["Video Title"]];
    if(status==="solved"&&!isSolved) return false;
    if(status==="unsolved"&&isSolved) return false;

    if(selectedConstraints.length){
      const itemC=(item["Puzzle Sub-Type / Constraints"]||"").split(";").map(s=>s.trim());
      if(constraintMode==="OR"){
        if(!selectedConstraints.some(c=>itemC.includes(c))) return false;
      }else{
        if(!selectedConstraints.every(c=>itemC.includes(c))) return false;
      }
    }

    return true;
  });

  filteredData.sort((a,b)=>parseDate(b.Date)-parseDate(a.Date));
  renderPage();
}

function renderPage(){
  const tbody=document.getElementById("tableBody");
  tbody.innerHTML="";
  const start=(currentPage-1)*rowsPerPage;
  const end=start+rowsPerPage;

  const solvedMap=getSolvedMap();

  filteredData.slice(start,end).forEach(item=>{
    const tr=document.createElement("tr");
    tr.onclick=(e)=>{
      if(e.target.type!=="checkbox")
        window.open(item["Link YT"],"_blank");
    };

    const isSolved=solvedMap[item["Video Title"]]||false;

    tr.innerHTML=`
    <td>${item.Date}</td>
    <td>${item["Video Title"]}</td>
    <td>${item["Host/Solver"]}</td>
    <td>${item["Setter"]}</td>
    <td>${item.Length}</td>
    <td>${(item["Puzzle Sub-Type / Constraints"]||"").split(";").map(c=>`<span class="badge">${c.trim()}</span>`).join("")}</td>
    <td><input type="checkbox" ${isSolved?"checked":""}></td>
    `;

    tr.querySelector("input").addEventListener("click",e=>{
      e.stopPropagation();
      const map=getSolvedMap();
      map[item["Video Title"]]=e.target.checked;
      saveSolvedMap(map);
    });

    tbody.appendChild(tr);
  });

  document.getElementById("counter").textContent=
    `Showing ${filteredData.length} of ${DATA.length} sudoku`;

  document.getElementById("pageInfo").textContent=
    `Page ${currentPage} of ${Math.ceil(filteredData.length/rowsPerPage)}`;

  document.getElementById("prevPage").disabled=currentPage===1;
  document.getElementById("nextPage").disabled=end>=filteredData.length;
}

document.addEventListener("input",applyFilters);

document.getElementById("prevPage").onclick=()=>{
  currentPage--;
  renderPage();
};

document.getElementById("nextPage").onclick=()=>{
  currentPage++;
  renderPage();
};

loadData();

</script>

</body>
</html>
