<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CTC Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="icon" href="data:,">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <span>CTC Finder</span>
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
      <rect x="3" y="3" width="6" height="6"/>
      <rect x="9" y="3" width="6" height="6"/>
      <rect x="15" y="3" width="6" height="6"/>
      <rect x="3" y="9" width="6" height="6"/>
      <rect x="9" y="9" width="6" height="6"/>
      <rect x="15" y="9" width="6" height="6"/>
      <rect x="3" y="15" width="6" height="6"/>
      <rect x="9" y="15" width="6" height="6"/>
      <rect x="15" y="15" width="6" height="6"/>
    </svg>
  </div>
</header>

<section class="filters">
  <div class="filter-row">
    <input type="text" id="search" placeholder="Title">

    <input type="number" id="minLength" placeholder="Min min">
    <input type="number" id="maxLength" placeholder="Max min">

    <input type="date" id="minDate">
    <input type="date" id="maxDate">

    <select id="statusFilter">
      <option value="all">All</option>
      <option value="solved">Solved</option>
      <option value="unsolved">Unsolved</option>
    </select>

    <button id="resetBtn">Reset</button>
  </div>

  <details id="constraintsContainer">
    <summary>Constraints (0)</summary>
    <div id="constraintsList" class="checkbox-group"></div>
    <div class="constraint-footer">
      <select id="constraintMode">
        <option value="OR">OR</option>
        <option value="AND">AND</option>
      </select>
    </div>
  </details>

  <div id="counter" class="counter"></div>

  <details id="hostsContainer">
  <summary>Hosts</summary>
  <div id="hostsList" class="checkbox-group"></div>
</details>

<details id="settersContainer">
  <summary>Setters</summary>
  <div id="settersList" class="checkbox-group"></div>
</details>
</section>

<section class="table-container">
  <table>
    <thead>
      <tr>
        <th>Solved</th>
        <th>Date</th>
        <th>Title</th>
        <th>Length</th>
        <th>Constraints</th>
        <th>Host</th>
        <th>Setter</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="pagination">
    <button id="prevPage">Prev</button>
    <span id="pageInfo"></span>
    <button id="nextPage">Next</button>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
